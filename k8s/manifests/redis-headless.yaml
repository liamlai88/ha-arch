# Headless Service：clusterIP: None，纯 DNS 寻址，不做 LB
# 用法：客户端通过 redis-N.redis-headless.<ns>.svc.cluster.local 直连
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  labels:
    app: redis
spec:
  clusterIP: None             # ★ 关键：没 ClusterIP = headless
  selector:
    app: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
