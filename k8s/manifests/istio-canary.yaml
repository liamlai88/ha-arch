# DestinationRule：告诉 Istio 怎么"分组"目标服务
# 按 version 标签把 product-svc 的后端拆成 v1 / v2 两个子集
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: product-svc-dr
spec:
  host: product-svc            # 对应 K8s Service 名
  subsets:
  - name: v1
    labels:
      version: v1              # ★ 匹配 Pod label
  - name: v2
    labels:
      version: v2

---
# VirtualService：定义路由规则
# 90% 流量到 v1 子集，10% 到 v2
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: product-svc-vs
spec:
  hosts:
  - product-svc                # 集群内通过这个名字访问（mesh 内流量）
  gateways:
  - mesh                       # 只处理集群内流量（NodePort 绕过 mesh，不受影响）
  http:
  - route:
    - destination:
        host: product-svc
        subset: v1
      weight: 90               # ★ 90% 到 v1
    - destination:
        host: product-svc
        subset: v2
      weight: 10               # ★ 10% 到 v2
