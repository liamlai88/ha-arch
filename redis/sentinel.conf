port 26379

# 使用 docker hostname 而非 IP（Sentinel 默认只用 IP，要显式打开）
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# 监控名为 mymaster 的主，初始地址 redis-master:6379，quorum=2
# 含义：3 个 Sentinel 里至少 2 个同意 master 挂了，才会触发故障转移
sentinel monitor mymaster redis-master 6379 2

# 5 秒 ping 不通就标记为 sdown（subjectively down，单方面认为挂）
sentinel down-after-milliseconds mymaster 5000

# 故障转移整体超时 10 秒
sentinel failover-timeout mymaster 10000

# 故障转移时，同时让几个 replica 跟新 master 同步（生产建议 1，避免雪崩）
sentinel parallel-syncs mymaster 1
